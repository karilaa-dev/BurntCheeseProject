<!-- Jesse was responsible for responsivity and accessibility -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Some Emissions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="flex justify-between p-4 h-[72px]">
      <div class="flex gap-3 self-center">
        <a href="/">Homepage</a>
        <a href="/about">About</a>
      </div>
      <h1 class="text-lg nav-title self-center">Some Emissions</h1>
    </nav>
      <main class="relative flex flex-col items-center justify-center text-center p-4">

        <div class="absolute inset-0 bg-[url('/images/background-image.jpg')] bg-cover bg-center filter blur-sm"></div>
        <div class="relative z-10 p-20 bg-white/90 backdrop-blur-md rounded-lg shadow-lg">
          <h1 class="text-4xl mb-5">Find Emissions and Energy Data</h1>
          <form class="w-full" action="/results" method="GET" role="search">
            <label for="city" class="sr-only">Enter a city</label>
            <input
              type="search"
              name="city"
              placeholder="Enter a city..."
              class="bg-slate-300 placeholder-black p-2 rounded-3xl max-w-96 w-full"
            />
            <button type="submit" class="mt-2 bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-full">Search</button>
          </form>
        </div>

      </main>
    <footer class="w-full text-center text-sm text-gray-500 p-4">
      Made with love by Burnt Cheese
    </footer>
  </body>
</html>
