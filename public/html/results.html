<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">

    <script>
        const params = new URLSearchParams(window.location.search);
        const query = params.get('city');

        fetch(`/api/carbonintensitydata?city=${query}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('data').innerHTML = JSON.stringify(data);
            });
    </script>

</head>
<body>
    <nav class="flex justify-between p-4">
        <div class="flex gap-3">
            <a href="/">Homepage</a>
            <a href="/about">About</a>
        </div>
        <h1 class="text-lg nav-title">Some Emissions</h1>
        <form action="/results" method="GET">
            <input type="text" placeholder="Enter an American city..." class="bg-slate-300 placeholder-black p-2 rounded-3xl" name="city">
        </form>
    </nav>
    <div class="flex flex-col items-center gap-10 min-h-screen justify-center -mt-20">
        <h1 id="data">Loading...</h1>   
    </div>
    <footer class="fixed bottom-0 w-full text-center text-sm text-gray-500 p-4">
        Made with love by Burnt Cheese
    </footer>
</body>
</html>
