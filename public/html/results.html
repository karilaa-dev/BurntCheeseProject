<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />

    <script>
      const params = new URLSearchParams(window.location.search);
      const query = params.get('city');

      fetch(`/api/allCityData?city=${encodeURIComponent(query)}`)
        .then((res) => res.json())
        .then((data) => {
          document.getElementById('data').innerHTML = renderCity(data);
        })
        .catch(() => {
          document.getElementById('data').innerHTML =
            '<p class="text-center text-red-500 mt-8">Error loading city data. Please try again.</p>';
        });

      function capitalize(str) {
        return str
          .split(' ')
          .map((w) => w.charAt(0).toUpperCase() + w.slice(1))
          .join(' ');
      }

      const NO_DATA = `<p class='text-gray-500'>No data available</p>`;

      function renderPowerSources(powerBreakdown) {
        if (!powerBreakdown) return NO_DATA;
        const sources = Object.entries(powerBreakdown)
          .filter(([, mw]) => mw != null && mw > 0)
          .sort((a, b) => b[1] - a[1]);
        if (sources.length === 0) return NO_DATA;
        const totalMw = sources.reduce((sum, [, mw]) => sum + mw, 0);
        return sources
          .map(([name, mw]) => {
            const pct = ((mw / totalMw) * 100).toFixed(2);
            return `<div class='flex justify-between bg-white rounded-lg px-4 py-2'>
                    <span><strong>${capitalize(name)}</strong> - ${pct}%</span>
                    <span class='text-gray-600'>${Math.round(mw)} MW</span>
                </div>`;
          })
          .join('');
      }

      function safeRound(value, decimals) {
        if (value == null) return 'N/A';
        const factor = Math.pow(10, decimals);
        return Math.round(value * factor) / factor;
      }

      function getColorClass(value, type) {
        if (value == null || value == 'N/A') return 'bg-gray-400';

        // carbon intensity metrics
        if (type == 'intensity'){
          if (value <= 50) return 'bg-green-500';
          if (value <= 100) return 'bg-green-400';
          if (value <= 200) return 'bg-yellow-400';
          if (value <= 300) return 'bg-orange-500';
          return 'bg-red-500';
        }

        // percentage metrics for carbon free and rebnewable energy
        if (type == 'percentage'){
          if (value >= 80) return 'bg-green-500';
          if (value >= 60) return 'bg-green-400';
          if (value >= 40) return 'bg-yellow-400';
          if (value >= 30) return 'bg-orange-500';
          return 'bg-red-500';
        }

        return 'bg-gray-400';
      }

      function renderCity(city) {
        const carbonIntensity = city.carbonIntensity ?? 'N/A';
        const carbonFree = safeRound(city.carbonFreePercentage, 1);
        const renewable = safeRound(city.renewablePercentage, 1);
        const load = safeRound(city.totalLoad != null ? city.totalLoad / 1000 : null, 2);

        // color variables
        const carbonIntensityColor = getColorClass(carbonIntensity, 'intensity')
        const carbonFreePercentageColor = getColorClass(carbonFree, 'percentage')
        const renewableEnergyColor = getColorClass(renewable, 'percentage')

        return `
                <div class='flex flex-col items-center px-4 py-8'>
                    <h1 class='text-4xl font-bold text-center mb-6'>${city.city}</h1>

                    <div class='bg-gray-100 rounded-2xl p-6 w-full max-w-4xl'>
                        <h3 class='text-xl text-center mb-4'>Current Information At A Glance</h3>
                        <div class='flex flex-wrap justify-center gap-4'>

                            <div class='flex flex-col items-center'>
                                <div class='${carbonIntensityColor} rounded-xl w-24 h-24 flex flex-col items-center justify-center text-white'>
                                    <p class='text-2xl font-bold'>${carbonIntensity}</p>
                                    <p class='text-xs'>gCO₂eq/kWh</p>
                                </div>
                                <p class='text-sm mt-1'>Carbon Intensity</p>
                            </div>

                            <div class='flex flex-col items-center'>
                                <div class='${carbonFreePercentageColor} rounded-xl w-24 h-24 flex flex-col items-center justify-center text-white'>
                                    <p class='text-2xl font-bold'>${carbonFree}</p>
                                    <p class='text-xs'>%</p>
                                </div>
                                <p class='text-sm mt-1'>Carbon Free</p>
                            </div>

                            <div class='flex flex-col items-center'>
                                <div class='${renewableEnergyColor} rounded-xl w-24 h-24 flex flex-col items-center justify-center text-white'>
                                    <p class='text-2xl font-bold'>${renewable}</p>
                                    <p class='text-xs'>%</p>
                                </div>
                                <p class='text-sm mt-1'>Renewable</p>
                            </div>

                            <div class='flex flex-col items-center'>
                                <div class='bg-yellow-300 rounded-xl w-24 h-24 flex flex-col items-center justify-center text-white'>
                                    <p class='text-2xl font-bold'>${load}</p>
                                    <p class='text-xs'>GW</p>
                                </div>
                                <p class='text-sm mt-1'>Electricity Load</p>
                            </div>

                        </div>
                    </div>

                    <div class='bg-gray-100 rounded-2xl p-6 mt-6 text-center' style='width: 37rem'>
                        <h3 class='text-xl font-bold mb-2'>Top Sources of Power</h3>
                        <div class='flex flex-col gap-2 text-left'>${renderPowerSources(city.powerBreakdown)}</div>
                    </div>
                </div>
                `;
      }
    </script>
  </head>
  <body>
    <nav class="justify-between p-4">
      <div class="flex gap-3 self-center">
        <a href="/">Homepage</a>
        <a href="/about">About</a>
      </div>
      <h1 class="text-lg nav-title self-center">Some Emissions</h1>
      <form class="nav-search" action="/results" method="GET">
        <input
          type="text"
          name="city"
          placeholder="Enter an American city..."
          class="bg-slate-300 placeholder-black p-2 rounded-3xl"
        />
      </form>
    </nav>
    <div id="data">
      <h1>Loading....</h1>
    </div>
    <footer class="w-full text-center text-sm text-gray-500 p-4">
      Made with love by Burnt Cheese
    </footer>
  </body>
</html>
