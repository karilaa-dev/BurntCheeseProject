<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />

    <script>
        const params = new URLSearchParams(window.location.search);
        const query = params.get('city');

        fetch(`/api/carbonintensitydata?city=${query}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('data').innerHTML = renderCity(data)
            });

        function renderCity(city) {
            return `
                <div class='flex flex-col items-center px-4 py-8'>
                    <h1 class='text-4xl font-bold text-center mb-6'>${city.city}</h1>

                    <div class='bg-gray-100 rounded-2xl p-6 w-full max-w-4xl'>
                        <h3 class='text-xl text-center mb-4'>Current Information At A Glance</h3>
                        <div class='flex flex-wrap justify-center gap-4'>

                            <div class='flex flex-col items-center'>
                                <div class='bg-red-400 rounded-xl w-24 h-24 flex flex-col items-center justify-center text-white'>
                                    <p class='text-2xl font-bold'>N/A</p>
                                    <p class='text-xs'>t of CO₂eq</p>
                                </div>
                                <p class='text-sm mt-1'>Carbon Emissions</p>
                            </div>

                            <div class='flex flex-col items-center'>
                                <div class='bg-green-500 rounded-xl w-24 h-24 flex flex-col items-center justify-center text-white'>
                                    <p class='text-2xl font-bold'>${city.carbonIntensity}</p>
                                    <p class='text-xs'>gCO₂eq/kWh</p>
                                </div>
                                <p class='text-sm mt-1'>Carbon Intensity</p>
                            </div>

                            <div class='flex flex-col items-center'>
                                <div class='bg-green-500 rounded-xl w-24 h-24 flex flex-col items-center justify-center text-white'>
                                    <p class='text-2xl font-bold'>N/A</p>
                                    <p class='text-xs'>%</p>
                                </div>
                                <p class='text-sm mt-1'>Carbon Free</p>
                            </div>

                            <div class='flex flex-col items-center'>
                                <div class='bg-green-500 rounded-xl w-24 h-24 flex flex-col items-center justify-center text-white'>
                                    <p class='text-2xl font-bold'>N/A</p>
                                    <p class='text-xs'>%</p>
                                </div>
                                <p class='text-sm mt-1'>Renewable</p>
                            </div>

                            <div class='flex flex-col items-center'>
                                <div class='bg-yellow-300 rounded-xl w-24 h-24 flex flex-col items-center justify-center text-white'>
                                    <p class='text-2xl font-bold'>N/A</p>
                                    <p class='text-xs'>GW</p>
                                </div>
                                <p class='text-sm mt-1'>Electricity Load</p>
                            </div>

                        </div>
                    </div>

                    <div class='bg-gray-100 rounded-2xl p-6 w-full max-w-4xl mt-6 text-center'>
                        <h3 class='text-xl mb-2'>Top Sources of Power</h3>
                        <p class='text-gray-500'>No data available</p>
                    </div>
                </div>
                `;
        }
    </script>
  </head>
  <body>
    <nav class="justify-between p-4">
      <div class="flex gap-3 self-center">
        <a href="/">Homepage</a>
        <a href="/about">About</a>
      </div>
      <h1 class="text-lg nav-title self-center">Some Emissions</h1>
      <form class="nav-search" action="/results" method="GET">
        <input
          type="text"
          name="city"
          placeholder="Enter an American city..."
          class="bg-slate-300 placeholder-black p-2 rounded-3xl"
        />
      </form>
    </nav>
    <div id='data'>
      <h1>Loading....</h1>
    </div>
    <footer class="w-full text-center text-sm text-gray-500 p-4">
      Made with love by Burnt Cheese
    </footer>
  </body>
</html>
