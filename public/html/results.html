<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />

    <script>
      const params = new URLSearchParams(window.location.search);
      const query = params.get('city');

      fetch(`/api/allCityData?city=${encodeURIComponent(query)}`)
        .then((res) => res.json())
        .then((data) => {
          if (data.error) {
            document.getElementById('data').innerHTML = renderNotFound(data.query);
            const input = document.querySelector('#data input[name="city"]');
            input.focus();
            input.setSelectionRange(input.value.length, input.value.length);
          } else {
            document.getElementById('data').innerHTML = renderCity(data);

            setTimeout(() => {
              document.querySelectorAll('.power-bar').forEach(bar => {
                bar.style.width = bar.dataset.width + '%';
              });
            }, 100);
          }
        })
        .catch(() => {
          document.getElementById('data').innerHTML =
            '<p class="text-center text-red-500 mt-8">Error loading city data. Please try again.</p>';
        });

      function renderNotFound(searchQuery) {
        return `
          <div class='flex flex-col items-center px-4 py-16'>
            <h1 class='text-3xl font-bold text-center mb-2'>We couldn't find '${searchQuery}'</h1>
            <p class='text-gray-500 mb-6'>Try searching for a different city</p>
            <form action='/results' method='GET' class='w-full max-w-md flex gap-2'>
              <input
                type='search'
                name='city'
                value='${searchQuery}'
                class='flex-1 bg-slate-300 placeholder-black p-3 rounded-3xl text-center text-lg'
                placeholder='Enter a city...'
                autofocus
              />
              <button type='submit' class='bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-full'>Search</button>
            </form>
          </div>
        `;
      }

      function capitalize(str) {
        return str
          .split(' ')
          .map((w) => w.charAt(0).toUpperCase() + w.slice(1))
          .join(' ');
      }

      const NO_DATA = `<p class='text-gray-500'>No data available</p>`;

      function renderPowerSources(powerBreakdown) {
        if (!powerBreakdown) return NO_DATA;
        const sources = Object.entries(powerBreakdown)
          .filter(([, mw]) => mw != null && mw > 0)
          .sort((a, b) => b[1] - a[1]);
        if (sources.length === 0) return NO_DATA;
        const totalMw = sources.reduce((sum, [, mw]) => sum + mw, 0);
        return sources
          .map(([name, mw]) => {
            const pct = ((mw / totalMw) * 100).toFixed(2);
            return `
      <div class='bg-white rounded-lg px-4 py-3'>
        
        <div class='flex justify-between mb-1'>
          <span><strong>${capitalize(name)}</strong> - ${pct}%</span>
          <span class='text-gray-600'>${Math.round(mw)} MW</span>
        </div>

        <div class='w-full bg-gray-200 rounded-full h-3 overflow-hidden'>
          <div 
            class='h-3 bg-[${getElectricityColor(name)}] transition-all duration-1000 ease-out power-bar'
            data-width='${pct}'
            style='width: 0%'>
          </div>
        </div>

      </div>
                `;
          })
          .join('');
      }

      function safeRound(value, decimals) {
        if (value == null) return 'N/A';
        const factor = Math.pow(10, decimals);
        return Math.round(value * factor) / factor;
      }

      function getColorClass(value, type) {
        if (value == null || value == 'N/A') return 'bg-gray-400';

        // carbon intensity metrics
        if (type == 'intensity') {
          if (value <= 50) return 'bg-lime-200 text-black';
          if (value <= 100) return 'bg-yellow-200 text-black';
          if (value <= 200) return 'bg-amber-400 text-white';
          if (value <= 300) return 'bg-red-800 text-white';
          return 'bg-red-950 text-white';
        }

        // percentage metrics for carbon free and rebnewable energy
        if (type == 'percentage') {
          if (value >= 80) return 'bg-lime-200 text-black';
          if (value >= 60) return 'bg-yellow-200 text-black';
          if (value >= 40) return 'bg-amber-400 text-white';
          if (value >= 30) return 'bg-red-800 text-white';
          return 'bg-red-950 text-white';
        }

        return 'bg-gray-400';
      }

      function getElectricityColor(electricityType) {

        const energyColors = {
          nuclear: "#a855f7",
          geothermal: "#f97316",
          biomass: "#84cc16",
          coal: "#374151",
          wind: "#38bdf8",
          solar: "#facc15",
          hydro: "#2563eb",
          gas: "#ef4444",
          oil: "#111827",
          unknown: "#a3a3a3",
          "hydro discharge": "#60a5fa",
          "battery discharge": "#10b981"
        };

        if (!electricityType || electricityType === "N/A") {
          return "#9ca3af";
      }

      return energyColors[electricityType];
      }

      function renderCity(city) {
        const carbonIntensity = city.carbonIntensity ?? 'N/A';
        const carbonFree = safeRound(city.carbonFreePercentage, 1);
        const renewable = safeRound(city.renewablePercentage, 1);
        const load = safeRound(
          city.totalLoad != null ? city.totalLoad / 1000 : null,
          2,
        );

        // color variables
        const carbonIntensityColor = getColorClass(
          carbonIntensity,
          'intensity',
        );
        const carbonFreePercentageColor = getColorClass(
          carbonFree,
          'percentage',
        );
        const renewableEnergyColor = getColorClass(renewable, 'percentage');

        return `
                <div class='flex flex-col items-center px-4 py-8'>
                    <h1 class='text-4xl font-bold text-center mb-1'>${city.city.split(', ').slice(0, -1).join(', ')}</h1>
                    <p class='text-lg text-gray-500 text-center mb-6'>${city.city.split(', ').slice(-1)[0]}</p>

                    <div class='bg-gray-100 rounded-2xl p-6 w-full max-w-4xl'>
                        <h2 class='text-xl text-center mb-4'>Current Information At A Glance</h2>
                        <div class='flex flex-wrap justify-center gap-4'>

                            <div class='flex flex-col items-center'>
                                <div class='${carbonIntensityColor} rounded-xl w-24 h-24 flex flex-col items-center justify-center'>
                                    <p class='text-2xl font-bold'>${carbonIntensity}</p>
                                    <p class='text-xs'>gCO₂eq/kWh</p>
                                </div>
                                <p class='text-sm mt-1'>Carbon Intensity</p>
                            </div>

                            <div class='flex flex-col items-center'>
                                <div class='${carbonFreePercentageColor} rounded-xl w-24 h-24 flex flex-col items-center justify-center'>
                                    <p class='text-2xl font-bold'>${carbonFree}</p>
                                    <p class='text-xs'>%</p>
                                </div>
                                <p class='text-sm mt-1'>Carbon Free</p>
                            </div>

                            <div class='flex flex-col items-center'>
                                <div class='${renewableEnergyColor} rounded-xl w-24 h-24 flex flex-col items-center justify-center '>
                                    <p class='text-2xl font-bold'>${renewable}</p>
                                    <p class='text-xs'>%</p>
                                </div>
                                <p class='text-sm mt-1'>Renewable</p>
                            </div>

                            <div class='flex flex-col items-center'>
                                <div class='bg-amber-400 rounded-xl w-24 h-24 flex flex-col items-center justify-center text-white'>
                                    <p class='text-2xl font-bold'>${load}</p>
                                    <p class='text-xs'>GW</p>
                                </div>
                                <p class='text-sm mt-1'>Electricity Load</p>
                            </div>

                        </div>
                    </div>

                    <div class='bg-gray-100 rounded-2xl p-6 mt-6 text-center' style='max-width: 37rem; width: 100%;'>
                        <h3 class='text-xl font-bold mb-2'>Top Sources of Power</h3>
                        <div class='flex flex-col gap-2 text-left'>${renderPowerSources(city.powerBreakdown)}</div>
                    </div>
                </div>
                `;
      }
    </script>
  </head>
  <body>
    <nav class="justify-between p-4">
      <div class="flex gap-3 self-center">
        <a href="/">Homepage</a>
        <a href="/about">About</a>
      </div>
      <h1 class="text-lg nav-title self-center">Some Emissions</h1>
      <form class="nav-search" action="/results" method="GET" role="search">
        <label for="city" class="sr-only"> Enter a city </label>
        <input
          type="search"
          name="city"
          placeholder="Enter a city..."
          class="bg-slate-300 placeholder-black p-2 rounded-3xl"
        />
        <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-full">Search</button>
      </form>
    </nav>
    <main id="data">
      <div id="spin-animation" class="flex flex-col items-center justify-center min-h-[10vh] gap-4">
        <div class="w-10 h-10 border-4 border-gray-300 border-t-blue-500 rounded-full animate-spin"></div>
        <h1 class="text-lg font-medium animate-pulse">Loading...</h1>
      </div>
    </main>
    <footer class="w-full text-center text-sm text-gray-500 p-4">
      Made with love by Burnt Cheese
    </footer>
  </body>
</html>
